name: nozofibi
description: A study timer app with task management and session tracking.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.15.2
  provider: ^6.0.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/dark.svg
    - assets/images/light.svg