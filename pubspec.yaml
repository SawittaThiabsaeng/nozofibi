name: nozofibi
description: A study timer app with task management and session tracking.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.2
  firebase_app_check: ^0.3.2+2
  firebase_crashlytics: ^4.0.3
  google_sign_in: ^6.1.5
  sign_in_with_apple: ^7.0.1
  provider: ^6.0.0
  intl: ^0.20.2
  flutter_svg: ^2.0.10
  flutter_local_notifications: ^17.2.3
  flutter_timezone: ^3.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.4
  image_picker: ^1.0.4
  image_cropper: ^8.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  firebase_auth_mocks: ^0.14.1
  fake_cloud_firestore: ^3.1.0
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/